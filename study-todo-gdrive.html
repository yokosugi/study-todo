<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>学習ToDoリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Caveat:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --paper: #faf8f2;
    --paper-dark: #f0ece0;
    --ink: #1a1614;
    --ink-light: #4a3f38;
    --ring: #2c2c2c;
    --accent-red: #c0392b;
    --accent-blue: #2980b9;
    --accent-green: #27ae60;
    --accent-orange: #e67e22;
    --accent-purple: #8e44ad;
    --line: #d4cec0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #8b7355;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(0,0,0,.05) 35px, rgba(0,0,0,.05) 70px);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0;
  }

  /* ===== LOGIN OVERLAY ===== */
  .login-overlay { position:fixed; inset:0; background:#8b7355; background-image:repeating-linear-gradient(45deg,transparent,transparent 35px,rgba(0,0,0,.05) 35px,rgba(0,0,0,.05) 70px); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .login-overlay.active { display:flex; }
  .login-card { width:100%; max-width:340px; background:var(--paper); border-radius:4px 12px 12px 4px; box-shadow:-8px 0 0 #6b5a4e,-16px 0 0 #5a4a3e,4px 4px 20px rgba(0,0,0,0.4); overflow:hidden; position:relative; }
  .login-rings { height:36px; background:var(--ring); display:flex; align-items:center; justify-content:space-around; padding:0 8px; }
  .login-body { padding:32px 28px 28px; text-align:center; }
  .login-title { font-family:'Caveat',cursive; font-size:28px; font-weight:600; color:var(--ink); margin-bottom:10px; }
  .login-sub { font-size:12px; color:var(--ink-light); line-height:1.7; margin-bottom:28px; }
  .login-google-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:12px 20px; background:white; border:2px solid var(--ink); border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700; color:var(--ink); cursor:pointer; transition:all 0.15s; margin-bottom:12px; }
  .login-google-btn:hover { background:var(--ink); color:var(--paper); }
  .login-google-btn:hover svg path { fill:white; }
  .login-skip-btn { background:transparent; border:none; color:var(--ink-light); font-size:11px; cursor:pointer; text-decoration:underline; font-family:'Noto Sans JP',sans-serif; }
  .login-skip-btn:hover { color:var(--ink); }

  /* ===== NOTEBOOK ===== */
  .notebook { width:100%; max-width:500px; background:var(--paper); border-radius:4px 12px 12px 4px; box-shadow:-8px 0 0 #6b5a4e,-16px 0 0 #5a4a3e,4px 4px 20px rgba(0,0,0,0.4),0 0 0 1px rgba(0,0,0,0.1); position:relative; overflow:hidden; display:none; }
  .notebook.active { display:block; }
  .rings { position:absolute; top:0; left:0; right:0; height:36px; background:var(--ring); display:flex; align-items:center; justify-content:space-around; padding:0 8px; z-index:10; }
  .ring { width:20px; height:28px; border:3px solid #666; border-radius:50% 50% 50% 50%/40% 40% 60% 60%; background:#888; box-shadow:inset 0 2px 4px rgba(255,255,255,0.3),0 2px 4px rgba(0,0,0,0.5); }
  .content { padding:48px 16px 16px; }

  /* Header */
  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; padding-bottom:10px; border-bottom:2px solid var(--ink); }
  .header-left { display:flex; flex-direction:column; gap:4px; }
  .date-row { display:flex; gap:10px; align-items:baseline; }
  .date-label { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; letter-spacing:2px; color:var(--ink-light); }
  .date-value { font-family:'Caveat',cursive; font-size:22px; font-weight:600; color:var(--ink); }
  .countdown-badge { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; color:var(--accent-red); background:#fdf0ee; border:1px solid #f5c6c0; border-radius:4px; padding:2px 7px; letter-spacing:0.5px; }
  .day-nav { display:flex; align-items:center; gap:8px; }
  .nav-btn { width:28px; height:28px; border:2px solid var(--ink); background:transparent; cursor:pointer; font-size:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:var(--ink); }
  .nav-btn:hover { background:var(--ink); color:var(--paper); }
  .day-badge { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; padding:3px 10px; border:2px solid var(--ink); border-radius:2px; color:var(--ink); min-width:50px; text-align:center; }

  /* Drive bar */
  .drive-bar { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:white; border:1px solid var(--line); border-radius:6px; margin-bottom:10px; font-size:11px; }
  .drive-status { display:flex; align-items:center; gap:6px; color:var(--ink-light); }
  .drive-dot { width:8px; height:8px; border-radius:50%; background:var(--line); flex-shrink:0; }
  .drive-dot.synced { background:var(--accent-green); }
  .drive-dot.syncing { background:var(--accent-orange); animation:pulse 1s infinite; }
  .drive-dot.error { background:var(--accent-red); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .drive-actions { display:flex; gap:6px; }
  .drive-btn { font-family:'Space Mono',monospace; font-size:9px; padding:3px 8px; border:1px solid var(--line); border-radius:3px; background:white; cursor:pointer; color:var(--ink-light); transition:all 0.15s; }
  .drive-btn:hover { border-color:var(--ink); color:var(--ink); }
  .drive-btn.save-btn { border-color:var(--accent-blue); color:var(--accent-blue); }
  .drive-btn.save-btn:hover { background:var(--accent-blue); color:white; }

  .weather-row { display:flex; justify-content:flex-end; gap:6px; margin-bottom:12px; }
  .weather-icon { width:28px; height:28px; border:1px solid var(--line); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; transition:all 0.15s; background:var(--paper); }
  .weather-icon.selected { border-color:var(--accent-blue); background:#e8f4f8; }

  .section-box { border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:14px; background:white; }
  .section-box-label { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:2px; color:var(--ink-light); margin-bottom:6px; }
  .dotted-lines { display:flex; flex-direction:column; gap:6px; }
  .dotted-line { border:none; border-bottom:1px dotted var(--line); background:transparent; width:100%; font-family:'Noto Sans JP',sans-serif; font-size:13px; color:var(--ink); padding:2px 0; outline:none; }
  .dotted-line::placeholder { color:var(--line); }

  .progress-bar-container { height:4px; background:var(--line); border-radius:2px; margin:8px 0 4px; overflow:hidden; }
  .progress-bar { height:100%; background:var(--ink); border-radius:2px; transition:width 0.4s ease; }
  .progress-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--ink-light); text-align:right; margin-bottom:12px; }

  .main-area-full { display:block; margin-bottom:14px; }
  .todo-list { display:flex; flex-direction:column; gap:2px; }
  .todo-section-header { font-family:'Space Mono',monospace; font-size:8px; font-weight:700; letter-spacing:2px; color:var(--ink-light); padding:8px 0 4px; border-top:1px solid var(--line); margin-top:4px; text-transform:uppercase; }
  .todo-section-header:first-child { border-top:none; padding-top:2px; }
  .todo-item { display:flex; align-items:flex-start; gap:8px; padding:6px 4px; border-bottom:1px dotted var(--line); transition:background 0.1s; border-radius:4px; }
  .todo-item:hover { background:rgba(0,0,0,0.02); }
  .checkbox { width:16px; height:16px; border:2px solid var(--ink-light); border-radius:2px; flex-shrink:0; margin-top:2px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; background:white; }
  .checkbox.checked { background:var(--ink); border-color:var(--ink); }
  .checkbox.checked::after { content:'✓'; color:white; font-size:10px; font-weight:700; }
  .todo-text { font-size:12px; line-height:1.5; color:var(--ink); flex:1; cursor:pointer; }
  .todo-text.done { text-decoration:line-through; opacity:0.4; }
  .section-divider { display:flex; align-items:center; gap:8px; margin:6px 0 4px; }
  .section-divider-line { flex:1; height:1px; background:var(--line); }
  .section-divider-text { font-family:'Space Mono',monospace; font-size:8px; color:var(--ink-light); letter-spacing:1px; }
  .optional-note { font-size:9px; color:var(--accent-orange); font-style:italic; }
  .tag { display:inline-block; font-size:9px; padding:1px 5px; border-radius:2px; font-family:'Space Mono',monospace; font-weight:700; flex-shrink:0; margin-top:1px; }
  .tag-math { background:#fdebd0; color:#e67e22; }
  .tag-sci { background:#e8f8f5; color:#27ae60; }
  .tag-jp { background:#fdf2f8; color:#8e44ad; }
  .tag-soc { background:#eaf2fb; color:#2980b9; }

  /* Add task */
  .add-task-btn { display:flex; align-items:center; gap:6px; padding:6px 4px; cursor:pointer; color:var(--ink-light); font-size:11px; border:1px dashed var(--line); border-radius:4px; margin-top:6px; transition:all 0.15s; background:transparent; width:100%; }
  .add-task-btn:hover { border-color:var(--ink); color:var(--ink); background:rgba(0,0,0,0.02); }
  .add-task-form { display:none; padding:8px; background:white; border:1px solid var(--line); border-radius:6px; margin-top:6px; gap:6px; flex-direction:column; }
  .add-task-form.open { display:flex; }
  .add-task-row { display:flex; gap:6px; align-items:center; }
  .add-task-select { border:1px solid var(--line); border-radius:4px; padding:4px 6px; font-family:'Noto Sans JP',sans-serif; font-size:11px; color:var(--ink); background:white; outline:none; }
  .add-task-input { border:1px solid var(--line); border-radius:4px; padding:4px 8px; font-family:'Noto Sans JP',sans-serif; font-size:11px; color:var(--ink); background:white; outline:none; flex:1; }
  .add-task-input:focus { border-color:var(--ink); }
  .add-task-submit { background:var(--ink); color:var(--paper); border:none; border-radius:4px; padding:4px 10px; font-size:11px; cursor:pointer; }
  .add-task-cancel { background:transparent; color:var(--ink-light); border:1px solid var(--line); border-radius:4px; padding:4px 8px; font-size:11px; cursor:pointer; }
  .custom-task-del { font-size:10px; color:var(--line); cursor:pointer; margin-left:auto; padding:0 2px; flex-shrink:0; }
  .custom-task-del:hover { color:var(--accent-red); }



  /* Study time - manual input */
  .timer-section { border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:14px; background:white; }
  .timer-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .subject-timer { display:flex; flex-direction:column; gap:4px; }
  .subject-timer-label { font-size:10px; font-weight:500; color:var(--ink-light); display:flex; align-items:center; gap:4px; }
  .time-input-row { display:flex; align-items:center; gap:4px; }
  .time-hm { display:flex; align-items:center; gap:2px; }
  .time-hm-input { width:44px; border:1.5px solid var(--line); border-radius:4px; padding:3px 6px; font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--ink); text-align:center; outline:none; background:white; }
  .time-hm-input:focus { border-color:var(--ink); }
  .time-hm-sep { font-family:'Noto Sans JP',sans-serif; font-size:11px; font-weight:500; color:var(--ink-light); padding:0 2px; }
  .time-hm-label { font-size:9px; color:var(--ink-light); }
  .time-total-display { font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-light); margin-left:2px; }

  /* Summary section */
  .summary-section { border:1px solid var(--line); border-radius:8px; padding:10px 12px; background:white; margin-bottom:14px; }

  /* Stats panel */
  .stats-panel { border:1px solid var(--line); border-radius:8px; background:white; overflow:hidden; margin-bottom:14px; }
  .stats-tabs { display:flex; border-bottom:1px solid var(--line); }
  .stats-tab { flex:1; padding:8px; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:1px; text-align:center; cursor:pointer; color:var(--ink-light); border:none; background:transparent; transition:all 0.15s; }
  .stats-tab.active { color:var(--ink); background:var(--paper-dark); border-bottom:2px solid var(--ink); }
  .stats-content { padding:12px; }
  .stats-totals { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:12px; }
  .stat-card { text-align:center; padding:6px 4px; border-radius:6px; border:1px solid var(--line); }
  .stat-card-label { font-size:9px; color:var(--ink-light); margin-bottom:2px; }
  .stat-card-value { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--ink); }
  .stat-card.total { background:var(--paper-dark); }
  .chart-container { position:relative; height:180px; }

  /* Nav tabs */
  .page-tabs { display:flex; margin-bottom:12px; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .page-tab { flex:1; padding:7px; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:1px; text-align:center; cursor:pointer; color:var(--ink-light); border:none; background:white; transition:all 0.15s; }
  .page-tab.active { color:var(--paper); background:var(--ink); }

  /* Routine Editor Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:flex-start; justify-content:center; z-index:200; padding:16px; overflow-y:auto; }
  .modal-overlay.active { display:flex; }
  .modal-box { width:100%; max-width:480px; background:var(--paper); border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.3); overflow:hidden; margin:auto; }
  .modal-header { background:var(--ink); color:var(--paper); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:2px; }
  .modal-close { background:transparent; border:none; color:var(--paper); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }
  .modal-body { padding:14px; }
  .modal-day-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
  .modal-day-tab { padding:5px 10px; border:1.5px solid var(--line); border-radius:4px; background:white; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; cursor:pointer; color:var(--ink-light); transition:all 0.15s; }
  .modal-day-tab.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .routine-task-list { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; max-height:50vh; overflow-y:auto; }
  .routine-task-row { display:flex; align-items:center; gap:6px; background:white; border:1px solid var(--line); border-radius:6px; padding:6px 8px; cursor:grab; }
  .routine-task-row:active { cursor:grabbing; opacity:0.7; }
  .routine-task-row.dragging { opacity:0.4; border-style:dashed; }
  .routine-task-row.drag-over { border-color:var(--accent-blue); background:#eaf2fb; }
  .routine-drag-handle { color:var(--line); font-size:14px; cursor:grab; flex-shrink:0; user-select:none; }
  .routine-task-tag { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; padding:1px 5px; border-radius:2px; flex-shrink:0; }
  .routine-task-text { flex:1; border:none; background:transparent; font-family:'Noto Sans JP',sans-serif; font-size:12px; color:var(--ink); outline:none; min-width:0; }
  .routine-task-text:focus { background:#f8f6f0; border-radius:3px; padding:0 3px; }
  .routine-task-del { color:var(--line); cursor:pointer; font-size:13px; flex-shrink:0; padding:0 2px; }
  .routine-task-del:hover { color:var(--accent-red); }
  .routine-add-row { display:flex; gap:6px; align-items:center; padding-top:8px; border-top:1px solid var(--line); }
  .routine-add-select { border:1.5px solid var(--line); border-radius:4px; padding:5px 6px; font-size:11px; font-family:'Noto Sans JP',sans-serif; color:var(--ink); background:white; outline:none; }
  .routine-add-input { flex:1; border:1.5px solid var(--line); border-radius:4px; padding:5px 8px; font-family:'Noto Sans JP',sans-serif; font-size:12px; color:var(--ink); outline:none; background:white; }
  .routine-add-input:focus { border-color:var(--ink); }
  .routine-add-btn { background:var(--ink); color:var(--paper); border:none; border-radius:4px; padding:5px 12px; font-size:11px; cursor:pointer; white-space:nowrap; }
  .modal-footer { padding:10px 14px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:8px; }
  .modal-save-btn { background:var(--accent-green); color:white; border:none; border-radius:6px; padding:9px 20px; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; cursor:pointer; letter-spacing:1px; }
  .modal-cancel-btn { background:transparent; color:var(--ink-light); border:1px solid var(--line); border-radius:6px; padding:9px 16px; font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; }

  /* Toast */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); padding:10px 20px; border-radius:20px; font-family:'Space Mono',monospace; font-size:11px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:1000; white-space:nowrap; }
  .toast.show { opacity:1; }

  /* Hanamaru */
  .hanamaru { font-size:22px; line-height:1; display:inline-block; animation:bloom 0.4s ease; }
  @keyframes bloom { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.3) rotate(5deg)} 100%{transform:scale(1) rotate(0);opacity:1} }

  /* Calendar */
  .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-header { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; text-align:center; padding:4px 0; color:var(--ink-light); }
  .cal-header.sun { color:#e74c3c; }
  .cal-header.sat { color:#2980b9; }
  .cal-day { min-height:46px; border-radius:6px; border:1px solid var(--line); background:white; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:3px 2px; cursor:pointer; transition:background 0.1s; position:relative; }
  .cal-day:hover { background:var(--paper-dark); }
  .cal-day.today { border-color:var(--ink); border-width:2px; }
  .cal-day.other-month { background:#f5f3ee; opacity:0.5; }
  .cal-day.selected { background:#fff8dc; border-color:var(--accent-orange); }
  .cal-day-num { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; color:var(--ink); }
  .cal-day-num.sun { color:#e74c3c; }
  .cal-day-num.sat { color:#2980b9; }
  .cal-mark { font-size:18px; line-height:1.2; }
  .cal-dot { width:5px; height:5px; border-radius:50%; background:var(--line); margin-top:2px; }
  .cal-dot.partial { background:var(--accent-orange); }
  .cal-empty { min-height:46px; }

  @media(max-width:400px){
    body{padding:0;}
    .notebook{border-radius:0;max-width:100%;}
    .setup-screen{border-radius:0;max-width:100%;}
    .timer-grid{grid-template-columns:1fr;}
    .stats-totals{grid-template-columns:repeat(3,1fr);}
  }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN OVERLAY -->
<div class="login-overlay active" id="loginOverlay">
  <div class="login-card">
    <div class="login-rings" id="loginRings"></div>
    <div class="login-body">
      <div class="login-title">📓 学習ToDoリスト</div>
      <div class="login-sub">Googleアカウントでログインして<br>どのデバイスからでも同期できます</div>
      <button class="login-google-btn" onclick="startLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Googleでログイン
      </button>
      <button class="login-skip-btn" onclick="skipLogin()">ログインせずに使う（このデバイスのみ）</button>
    </div>
  </div>
</div>

<!-- NOTEBOOK -->
<div class="notebook" id="notebook">
  <div class="rings" id="rings"></div>

function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getDayState(d){
  const k=dateKey(d);
  if(!appState[k]) appState[k]={checked:{},weather:null,goals:['','',''],summary:['','',''],timers:{math:0,sci:0,jp:0,soc:0},timetable:{},customTasks:[]};

// Auto-save: 3秒後にDriveへ保存（連続入力時はリセット）
let autoSaveTimer=null;
function scheduleAutoSave(){
  if(!DRIVE_CLIENT_ID||!gapiReady||!accessToken) return;
  if(autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{
    autoSaveTimer=null;
    saveToDriveQuiet();
  },3000);
}

async function saveToDriveQuiet(){
  if(!DRIVE_CLIENT_ID||!gapiReady||!accessToken) return;
  try{
    const content=JSON.stringify({appState,driveFileId,customRoutines});
    const blob=new Blob([content],{type:'application/json'});
    const metadata={name:DRIVE_FILE_NAME,mimeType:'application/json'};
    if(driveFileId){
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
      form.append('file',blob);
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:`Bearer ${accessToken}`},body:form});
    }else{
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
      form.append('file',blob);
      const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${accessToken}`},body:form});
      if(res.ok){const json=await res.json();driveFileId=json.id;localStorage.setItem('studyTodoV3',JSON.stringify({appState,driveFileId,currentDate:currentDate.toISOString()}));}
    }
    updateDriveStatus('synced','Google Drive: 自動保存済み ✓');
  }catch(e){console.warn('Auto-save failed',e);}
}
function loadLocal(){

  }catch(e){}
}

function updateCountdown(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.ceil((COUNTDOWN_TARGET - today)/(1000*60*60*24));
  const el = document.getElementById('countdownBadge');
  if(diff>0) el.textContent=`2027/02/02まで あと${diff}日`;
  else if(diff===0) el.textContent='🎉 今日が目標日！';
  else el.textContent=`目標日から${-diff}日経過`;
}

// ============================================
// GOOGLE API
// ============================================
function initGapi(){
  if(!DRIVE_CLIENT_ID) return;
  gapi.load('client',async()=>{
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gapiReady=true;
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:DRIVE_CLIENT_ID,scope:SCOPES,
      callback:(response)=>{
        if(response.error){ updateDriveStatus('error','Google Drive: 認証失敗'); return; }
        accessToken=response.access_token;
        gapi.client.setToken({access_token:accessToken});
        updateDriveStatus('syncing','Google Drive: 読み込み中...');
        loadFromDriveAuto();
      },
    });
    updateDriveStatus('synced','Google Drive: 接続中...');
    setTimeout(()=>{ tokenClient.requestAccessToken({prompt:''}); }, 800);
  });
}
async function ensureToken(){
  return new Promise((resolve,reject)=>{
    if(accessToken){resolve();return;}
    const orig=tokenClient.callback;
    tokenClient.callback=(resp)=>{orig(resp);if(resp.error)reject(resp.error);else resolve();};
    tokenClient.requestAccessToken({prompt:''});
  });
}
async function saveToDrive(){
  if(!DRIVE_CLIENT_ID||!gapiReady){showToast('⚙️ まずGoogle Drive設定を行ってください');return;}
  updateDriveStatus('syncing','保存中...');
  try{
    await ensureToken();
    const content=JSON.stringify({appState,driveFileId,customRoutines});
    const blob=new Blob([content],{type:'application/json'});
    const metadata={name:DRIVE_FILE_NAME,mimeType:'application/json'};
    if(driveFileId){
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
      form.append('file',blob);
      const res=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:`Bearer ${accessToken}`},body:form});
      if(!res.ok)throw new Error(await res.text());
    }else{
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
      form.append('file',blob);
      const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${accessToken}`},body:form});
      if(!res.ok)throw new Error(await res.text());
      const json=await res.json();driveFileId=json.id;
    }
    saveLocal();updateDriveStatus('synced','Google Drive: 保存済み ✓');showToast('💾 Google Driveに保存しました');
  }catch(e){console.error(e);updateDriveStatus('error','Google Drive: 保存失敗');showToast('❌ 保存に失敗しました。再認証してください。');accessToken=null;}
}
async function loadFromDrive(){
  if(!DRIVE_CLIENT_ID||!gapiReady){showToast('⚙️ まずGoogle Drive設定を行ってください');return;}
  updateDriveStatus('syncing','読み込み中...');
  try{
    await ensureToken();
    let fileId=driveFileId;
    if(!fileId){
      const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}'+and+trashed=false&fields=files(id,name)`,{headers:{Authorization:`Bearer ${accessToken}`}});
      const json=await res.json();
      if(json.files&&json.files.length>0)fileId=json.files[0].id;
    }
    if(!fileId){showToast('📂 Drive上にデータが見つかりません');updateDriveStatus('synced','Google Drive: 接続済み');return;}
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${accessToken}`}});
    const data=await res.json();
    appState=data.appState||{};driveFileId=fileId;
    if(data.customRoutines){customRoutines=data.customRoutines;saveCustomRoutines();}
    saveLocal();updateDriveStatus('synced','Google Drive: 読込済み ✓');showToast('📥 Google Driveから読み込みました');render();
  }catch(e){console.error(e);updateDriveStatus('error','Google Drive: 読込失敗');showToast('❌ 読込に失敗しました。');accessToken=null;}
}

// 起動時の自動読み込み（トースト不要・静かに同期）
async function loadFromDriveAuto(){
  if(!accessToken) return;
  try{
    let fileId=driveFileId;
    if(!fileId){
      const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}'+and+trashed=false&fields=files(id,name)`,{headers:{Authorization:`Bearer ${accessToken}`}});
      const json=await res.json();
      if(json.files&&json.files.length>0)fileId=json.files[0].id;
    }
    if(!fileId){ updateDriveStatus('synced','Google Drive: 接続済み（データなし）'); return; }
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${accessToken}`}});
    const data=await res.json();
    appState=data.appState||{};driveFileId=fileId;
    if(data.customRoutines){customRoutines=data.customRoutines;saveCustomRoutines();}
    try{localStorage.setItem('studyTodoV3',JSON.stringify({appState,driveFileId,currentDate:currentDate.toISOString()}));}catch(e){}
    updateDriveStatus('synced','Google Drive: 同期済み ✓');
    render();
  }catch(e){
    console.warn('Auto-load failed',e);
    updateDriveStatus('synced','Google Drive: 接続済み');
  }
}
function updateDriveStatus(state,text){
  document.getElementById('driveDot').className='drive-dot '+state;
  document.getElementById('driveStatusText').textContent=text;
}

// RENDER MAIN
// ============================================
function render(){
  updateCountdown();
  const dayName=DAY_NAMES[currentDate.getDay()];
  const tasks=getRoutine(dayName);
  const st=getDayState(currentDate);
  const m=currentDate.getMonth()+1;
  const d2=currentDate.getDate();
  document.getElementById('dateDisplay').textContent=`${currentDate.getFullYear()}/${String(m).padStart(2,'0')}/${String(d2).padStart(2,'0')}`;
  const todayCheck=new Date();todayCheck.setHours(0,0,0,0);
  const isToday2=currentDate.getTime()===todayCheck.getTime();
  document.getElementById('dayBadge').textContent=dayName+'曜';
  // 今日マーク: date-value に下線 + 今日バッジ
  const dateValEl=document.getElementById('dateDisplay');
  dateValEl.style.borderBottom = isToday2 ? '3px solid var(--accent-red)' : 'none';
  dateValEl.style.paddingBottom = isToday2 ? '2px' : '0';
  const todayLabelEl=document.getElementById('todayLabel');
  if(todayLabelEl) todayLabelEl.style.display = isToday2 ? 'inline-block' : 'none';
  document.querySelectorAll('.weather-icon').forEach(el=>{el.classList.toggle('selected',el.textContent.trim()===st.weather);});
  ['goal1','goal2','goal3'].forEach((id,i)=>{document.getElementById(id).value=st.goals[i]||'';});
  ['summary1','summary2','summary3'].forEach((id,i)=>{document.getElementById(id).value=st.summary[i]||'';});

  // Todos
  const todoList=document.getElementById('todoList');
  todoList.innerHTML='';
  const allTasks=[...tasks,...(st.customTasks||[]).map(t=>({...t,custom:true}))];
  const checkable=allTasks.filter(t=>!t.type);
  const total=checkable.length;
  const done=checkable.filter(t=>st.checked[t.id]).length;

  allTasks.forEach(task=>{
    if(task.type==='section'){
      const el=document.createElement('div');el.className='todo-section-header';el.textContent=task.text;todoList.appendChild(el);return;
    }
    if(task.type==='section2'){
      const el=document.createElement('div');el.className='section-divider';
      el.innerHTML=`<div class="section-divider-line"></div><div class="section-divider-text">${task.text}</div><div class="section-divider-line"></div>`;
      todoList.appendChild(el);return;
    }
    const el=document.createElement('div');el.className='todo-item';
    if(task.indent)el.style.paddingLeft='12px';
    const cb=document.createElement('div');cb.className='checkbox'+(st.checked[task.id]?' checked':'');
    cb.onclick=()=>{st.checked[task.id]=!st.checked[task.id];saveLocal();render();};
    const txt=document.createElement('div');txt.className='todo-text'+(st.checked[task.id]?' done':'');
    let html='';
    if(task.tag)html+=`<span class="tag ${TAG_CLASSES[task.tag]}">${TAG_LABELS[task.tag]}</span> `;
    html+=task.text;
    if(task.note)html+=`<br><span class="optional-note">※ ${task.note}</span>`;
    txt.innerHTML=html;
    txt.onclick=()=>{st.checked[task.id]=!st.checked[task.id];saveLocal();render();};
    el.appendChild(cb);el.appendChild(txt);
    if(task.custom){
      const del=document.createElement('span');del.className='custom-task-del';del.textContent='✕';
      del.onclick=(e)=>{e.stopPropagation();removeCustomTask(task.id);};
      el.appendChild(del);
    }
    todoList.appendChild(el);
  });

  // Add task button
  const addBtn=document.createElement('button');addBtn.className='add-task-btn';addBtn.innerHTML='＋ タスクを追加';
  addBtn.onclick=()=>{const f=document.getElementById('addTaskForm');f.classList.toggle('open');};
  todoList.appendChild(addBtn);
  const addForm=document.createElement('div');addForm.className='add-task-form';addForm.id='addTaskForm';
  const currentDayName = DAY_NAMES[currentDate.getDay()];
  addForm.innerHTML=`
    <div class="add-task-row">
      <select class="add-task-select" id="newTaskTag">
        <option value="math">算数</option><option value="sci">理科</option>
        <option value="jp">国語</option><option value="soc">社会</option>
      </select>
      <input class="add-task-input" id="newTaskText" placeholder="タスク内容を入力...">
    </div>
    <div class="add-task-row" style="gap:4px;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-light);cursor:pointer">
        <input type="checkbox" id="newTaskRoutine"> 毎週${currentDayName}曜のルーティーンに追加
      </label>
    </div>
    <div class="add-task-row">
      <button class="add-task-submit" onclick="addCustomTask()">追加</button>
      <button class="add-task-cancel" onclick="document.getElementById('addTaskForm').classList.remove('open')">キャンセル</button>
    </div>`;
  todoList.appendChild(addForm);

  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${done} / ${total} 完了 (${pct}%)`;
  // 花丸: 全タスク完了かつタスクが1個以上ある場合
  const hana=document.getElementById('hanamaruBadge');
  if(hana){
    const allDone = total>0 && done===total;
    hana.style.display = allDone ? 'inline-block' : 'none';
  }

  renderTimers();
}

function addCustomTask(){
  const tag=document.getElementById('newTaskTag').value;
  const text=document.getElementById('newTaskText').value.trim();
  if(!text)return;
  const isRoutine=document.getElementById('newTaskRoutine')&&document.getElementById('newTaskRoutine').checked;
  const id='custom_'+Date.now();
  if(isRoutine){
    // ルーティーンに追加
    const dayName=DAY_NAMES[currentDate.getDay()];
    if(!customRoutines[dayName]) customRoutines[dayName]=JSON.parse(JSON.stringify(getRoutine(dayName)));
    customRoutines[dayName].push({id,text,tag});
    saveCustomRoutines();
    showToast('✅ '+dayName+'曜日のルーティーンに追加しました');
  } else {
    // その日だけ
    const st=getDayState(currentDate);
    st.customTasks.push({id,text,tag,custom:true});
    saveLocal();
  }
  render();
}
function removeCustomTask(id){
  const st=getDayState(currentDate);
  st.customTasks=st.customTasks.filter(t=>t.id!==id);
  delete st.checked[id];
  saveLocal();render();
}

function renderTimers(){
  const st=getDayState(currentDate);
  const grid=document.getElementById('timerGrid');
  grid.innerHTML='';
  SUBJECTS.forEach(subj=>{
    // timers stored as minutes directly
    const totalMins = st.timers[subj.key]||0;
    const h=Math.floor(totalMins/60);
    const m=totalMins%60;
    const div=document.createElement('div');div.className='subject-timer';
    const label=document.createElement('div');label.className='subject-timer-label';
    label.innerHTML=`<span>${subj.emoji}</span><span style="color:${subj.color};font-weight:700">${subj.label}</span>`;
    const row=document.createElement('div');row.className='time-input-row';
    const hm=document.createElement('div');hm.className='time-hm';
    const hInp=document.createElement('input');hInp.className='time-hm-input';hInp.type='number';hInp.min='0';hInp.max='23';hInp.placeholder='0';hInp.value=h;hInp.id=`th-${subj.key}`;
    const sep=document.createElement('span');sep.className='time-hm-sep';sep.textContent='時間';
    const mInp=document.createElement('input');mInp.className='time-hm-input';mInp.type='number';mInp.min='0';mInp.max='59';mInp.placeholder='00';mInp.value=String(m).padStart(2,'0');mInp.id=`tm-${subj.key}`;
    const lbl=document.createElement('span');lbl.className='time-hm-label';lbl.textContent='分';
    const onchange=()=>{
      const hv=parseInt(document.getElementById(`th-${subj.key}`).value)||0;
      const mv=parseInt(document.getElementById(`tm-${subj.key}`).value)||0;
      st.timers[subj.key]=hv*60+mv; // store as minutes
      saveLocal();
    };
    hInp.onchange=onchange;mInp.onchange=onchange;
    hm.appendChild(hInp);hm.appendChild(sep);hm.appendChild(mInp);hm.appendChild(lbl);
    row.appendChild(hm);
    div.appendChild(label);div.appendChild(row);
    grid.appendChild(div);
  });
}

// STATS
// ============================================
function getTotalMinutes(key, dateFilter){
  let total=0;
  Object.entries(appState).forEach(([dk,st])=>{
    if(dateFilter&&!dateFilter(dk)) return;
    total+=(st.timers&&st.timers[key]||0); // stored as minutes
  });
  return total;
}

function renderStats(){
  // Totals
  const totalsEl=document.getElementById('statsTotals');
  totalsEl.innerHTML='';
  let grandTotal=0;
  SUBJECTS.forEach(subj=>{
    const mins=getTotalMinutes(subj.key);
    grandTotal+=mins;
    const card=document.createElement('div');card.className='stat-card';
    card.innerHTML=`<div class="stat-card-label">${subj.emoji}${subj.label}</div><div class="stat-card-value" style="color:${subj.color}">${formatMins(mins)}</div>`;
    totalsEl.appendChild(card);
  });
  const totalCard=document.createElement('div');totalCard.className='stat-card total';
  totalCard.innerHTML=`<div class="stat-card-label">📚合計</div><div class="stat-card-value">${formatMins(grandTotal)}</div>`;
  totalsEl.appendChild(totalCard);

  renderChart(currentChartMode);
}

function formatMins(m){
  const h=Math.floor(m/60);const min=m%60;
  if(h>0)return `${h}h${min>0?min+'m':''}`;
  return `${min}m`;
}

function switchChart(mode){
  currentChartMode=mode;
  document.getElementById('chartTab-week').classList.toggle('active',mode==='week');
  document.getElementById('chartTab-month').classList.toggle('active',mode==='month');
  renderChart(mode);
}

function renderChart(mode){
  const ctx=document.getElementById('studyChart').getContext('2d');
  if(studyChart){studyChart.destroy();studyChart=null;}

  let labels=[];
  let datasets=[];

  if(mode==='week'){
    // Last 8 weeks
    const weeks=[];
    const today=new Date();today.setHours(0,0,0,0);
    for(let w=7;w>=0;w--){
      const weekStart=new Date(today);
      weekStart.setDate(today.getDate()-today.getDay()-w*7);
      const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
      const label=`${weekStart.getMonth()+1}/${weekStart.getDate()}週`;
      weeks.push({label,start:weekStart,end:weekEnd});
    }
    labels=weeks.map(w=>w.label);
    datasets=SUBJECTS.map(subj=>({
      label:subj.label,
      data:weeks.map(w=>{
        let total=0;
        Object.entries(appState).forEach(([dk,st])=>{
          const d=new Date(dk);
          if(d>=w.start&&d<=w.end) total+=(st.timers&&st.timers[subj.key]||0);
        });
        return Math.round(total/60*10)/10; // hours
      }),
      backgroundColor:subj.color+'cc',
    }));
  } else {
    // Last 6 months
    const months=[];
    const today=new Date();
    for(let i=5;i>=0;i--){
      const d=new Date(today.getFullYear(),today.getMonth()-i,1);
      months.push({label:`${d.getFullYear()}/${d.getMonth()+1}月`,year:d.getFullYear(),month:d.getMonth()});
    }
    labels=months.map(m=>m.label);
    datasets=SUBJECTS.map(subj=>({
      label:subj.label,
      data:months.map(m=>{
        let total=0;
        Object.entries(appState).forEach(([dk,st])=>{
          const d=new Date(dk);
          if(d.getFullYear()===m.year&&d.getMonth()===m.month)
            total+=(st.timers&&st.timers[subj.key]||0);
        });
        return Math.round(total/60*10)/10; // minutes -> hours
      }),
      backgroundColor:subj.color+'cc',
    }));
  }

  studyChart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:10},boxWidth:12}}},
      scales:{
        x:{stacked:true,ticks:{font:{size:8}}},
        y:{stacked:true,ticks:{font:{size:9},callback:v=>v+'h'},title:{display:true,text:'時間(h)',font:{size:9}}}
      }
    }
  });
}

// ============================================
// CALENDAR
// ============================================
let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth();

function calendarPrevMonth(){
  calendarMonth--;
  if(calendarMonth<0){calendarMonth=11;calendarYear--;}
  renderCalendar();
}
function calendarNextMonth(){
  calendarMonth++;
  if(calendarMonth>11){calendarMonth=0;calendarYear++;}
  renderCalendar();
}

function isDayComplete(dk){
  const st = appState[dk];
  if(!st) return false;
  const d = new Date(dk);
  const dayName = DAY_NAMES[d.getDay()];
  const tasks = getRoutine(dayName);
  const allTasks = [...tasks,...(st.customTasks||[])];
  const checkable = allTasks.filter(t=>!t.type);
  if(checkable.length===0) return false;
  return checkable.every(t=>st.checked[t.id]);
}
function isDayPartial(dk){
  const st = appState[dk];
  if(!st) return false;
  const d = new Date(dk);
  const dayName = DAY_NAMES[d.getDay()];
  const tasks = getRoutine(dayName);
  const allTasks = [...tasks,...(st.customTasks||[])];
  const checkable = allTasks.filter(t=>!t.type);
  if(checkable.length===0) return false;
  return checkable.some(t=>st.checked[t.id]) && !checkable.every(t=>st.checked[t.id]);
}
function hasTasks(dk){
  const d = new Date(dk);
  const dayName = DAY_NAMES[d.getDay()];
  const st = appState[dk];
  const tasks = getRoutine(dayName);
  const custom = st ? (st.customTasks||[]) : [];
  return [...tasks,...custom].filter(t=>!t.type).length > 0;
}

function renderCalendar(){
  document.getElementById('calMonthLabel').textContent =
    `${calendarYear}年 ${calendarMonth+1}月`;
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  // Day headers
  const dayHeaders = ['日','月','火','水','木','金','土'];
  const headerClasses = ['sun','','','','','','sat'];
  dayHeaders.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='cal-header '+headerClasses[i];
    h.textContent=d;
    grid.appendChild(h);
  });
  // First day of month
  const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
  const daysInMonth = new Date(calendarYear, calendarMonth+1, 0).getDate();
  const prevDays = new Date(calendarYear, calendarMonth, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const selKey = dateKey(currentDate);

  // Prev month filler
  for(let i=0;i<firstDay;i++){
    const d=document.createElement('div');d.className='cal-day other-month';
    const num=document.createElement('div');num.className='cal-day-num';
    num.textContent=prevDays-firstDay+1+i;
    d.appendChild(num);grid.appendChild(d);
  }
  // Days of this month
  for(let day=1;day<=daysInMonth;day++){
    const date=new Date(calendarYear,calendarMonth,day);
    const dk=`${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=date.getTime()===today.getTime();
    const isSel=dk===selKey;
    const dow=date.getDay();
    const complete=isDayComplete(dk);
    const partial=isDayPartial(dk);
    const hasT=hasTasks(dk);

    const d=document.createElement('div');
    let cls='cal-day';
    if(isToday) cls+=' today';
    if(isSel) cls+=' selected';
    if(complete) cls+=' complete';
    d.className=cls;
    d.onclick=()=>{
      currentDate=new Date(calendarYear,calendarMonth,day);
      saveLocal();showPage('todo');render();
    };

    const num=document.createElement('div');
    num.className='cal-day-num'+(dow===0?' sun':dow===6?' sat':'');
    num.textContent=day;
    d.appendChild(num);

    if(complete){
      const mark=document.createElement('div');mark.className='cal-mark';mark.textContent='🌸';
      d.appendChild(mark);
    } else if(partial){
      const dot=document.createElement('div');dot.className='cal-dot partial';
      d.appendChild(dot);
    } else if(hasT){
      const dot=document.createElement('div');dot.className='cal-dot';
      d.appendChild(dot);
    }
    grid.appendChild(d);
  }
  // Next month filler
  const remaining=(7-((firstDay+daysInMonth)%7))%7;
  for(let i=1;i<=remaining;i++){
    const d=document.createElement('div');d.className='cal-day other-month';
    const num=document.createElement('div');num.className='cal-day-num';
    num.textContent=i;
    d.appendChild(num);grid.appendChild(d);
  }
}

// ROUTINE EDITOR
// ============================================
let editorDay = '月';
let editorTasks = []; // working copy
let dragSrcIdx = null;

function openRoutineEditor(){
  editorDay = DAY_NAMES[currentDate.getDay()];
  document.getElementById('routineModal').classList.add('active');
  renderEditorDayTabs();
  loadEditorDay();
}
function closeRoutineEditor(){
  document.getElementById('routineModal').classList.remove('active');
}
function renderEditorDayTabs(){
  const container = document.getElementById('routineDayTabs');
  container.innerHTML='';
  ['月','火','水','木','金','土','日'].forEach(day=>{
    const btn=document.createElement('button');
    btn.className='modal-day-tab'+(day===editorDay?' active':'');
    btn.textContent=day+'曜';
    btn.onclick=()=>{
      // save current before switching
      editorDay=day;
      renderEditorDayTabs();
      loadEditorDay();
    };
    container.appendChild(btn);
  });
}
function loadEditorDay(){
  // Deep copy current routine for this day
  editorTasks = JSON.parse(JSON.stringify(getRoutine(editorDay)));
  renderEditorTaskList();
}
function renderEditorTaskList(){
  const list=document.getElementById('routineTaskList');
  list.innerHTML='';
  editorTasks.forEach((task,idx)=>{
    if(task.type){
      // section headers shown as non-draggable label
      const row=document.createElement('div');
      row.style.cssText='padding:4px 8px;font-family:Space Mono,monospace;font-size:9px;font-weight:700;color:var(--ink-light);letter-spacing:1px;background:#f8f6f0;border-radius:4px;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between';
      row.innerHTML=`<span>${task.text}</span>`;
      const del=document.createElement('span');del.className='routine-task-del';del.textContent='✕';
      del.onclick=()=>{editorTasks.splice(idx,1);renderEditorTaskList();};
      row.appendChild(del);
      list.appendChild(row);
      return;
    }
    const row=document.createElement('div');
    row.className='routine-task-row';
    row.draggable=true;
    row.dataset.idx=idx;
    row.ondragstart=(e)=>{ dragSrcIdx=idx; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; };
    row.ondragend=()=>{ row.classList.remove('dragging'); document.querySelectorAll('.routine-task-row').forEach(r=>r.classList.remove('drag-over')); };
    row.ondragover=(e)=>{ e.preventDefault(); row.classList.add('drag-over'); };
    row.ondragleave=()=>row.classList.remove('drag-over');
    row.ondrop=(e)=>{
      e.preventDefault();
      row.classList.remove('drag-over');
      if(dragSrcIdx===null||dragSrcIdx===idx) return;
      const moved=editorTasks.splice(dragSrcIdx,1)[0];
      editorTasks.splice(idx,0,moved);
      dragSrcIdx=null;
      renderEditorTaskList();
    };

    const handle=document.createElement('span');handle.className='routine-drag-handle';handle.textContent='⠿';
    const tagSpan=document.createElement('span');
    if(task.tag){tagSpan.className=`routine-task-tag ${TAG_CLASSES[task.tag]}`;tagSpan.textContent=TAG_LABELS[task.tag];}
    const inp=document.createElement('input');inp.className='routine-task-text';inp.value=task.text;
    inp.oninput=()=>{editorTasks[idx].text=inp.value;};
    const del=document.createElement('span');del.className='routine-task-del';del.textContent='✕';
    del.onclick=()=>{editorTasks.splice(idx,1);renderEditorTaskList();};

    row.appendChild(handle);
    if(task.tag) row.appendChild(tagSpan);
    row.appendChild(inp);
    row.appendChild(del);
    list.appendChild(row);
  });
}
function routineAddTask(){
  const tag=document.getElementById('routineAddTag').value;
  const text=document.getElementById('routineAddText').value.trim();
  if(!text) return;
  editorTasks.push({id:'custom_'+Date.now(),text,tag});
  document.getElementById('routineAddText').value='';
  renderEditorTaskList();
}
function saveRoutineEditor(){
  customRoutines[editorDay]=JSON.parse(JSON.stringify(editorTasks));
  saveCustomRoutines();
  closeRoutineEditor();
  render();
  showToast('✅ '+editorDay+'曜日のルーティーンを保存しました');
}

})();
</script>
